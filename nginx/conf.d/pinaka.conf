# ═══════════════════════════════════════════════════════════════════════════════
#  Pinaka Reverse Proxy — pinaka.space & api.pinaka.space
#  Handles: HTTP → HTTPS redirect, ACME challenge, SSL termination, proxying
# ═══════════════════════════════════════════════════════════════════════════════

# ── Upstream definitions ──────────────────────────────────────────────────────
upstream frontend_upstream {
    server pinaka_frontend:80;
}

upstream backend_upstream {
    server pinaka_backend:5000;
}

# ══════════════════╗
#  HTTP — port 80   ║  Redirect all HTTP → HTTPS, except ACME challenges
# ══════════════════╝

# pinaka.space  (HTTP)
server {
    listen 80;
    server_name pinaka.space www.pinaka.space;

    # Let's Encrypt / Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://pinaka.space$request_uri;
    }
}

# api.pinaka.space  (HTTP)
server {
    listen 80;
    server_name api.pinaka.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.pinaka.space$request_uri;
    }
}

# ═══════════════════╗
#  HTTPS — port 443  ║  FRONTEND  →  pinaka.space
# ═══════════════════╝

server {
    listen 443 ssl;
    http2  on;
    server_name pinaka.space www.pinaka.space;

    # ── SSL certificates (managed by Certbot on the EC2 host) ─────────────────
    ssl_certificate     /etc/letsencrypt/live/pinaka.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pinaka.space/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/pinaka.space/chain.pem;

    # ── SSL hardening ─────────────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — disabled (certbot standalone certs have no OCSP URL)
    # ssl_stapling        on;
    # ssl_stapling_verify on;
    # resolver            8.8.8.8 8.8.4.4 valid=300s;
    # resolver_timeout    5s;

    # HSTS — 6 months, include subdomains
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # ── Proxy to frontend container ───────────────────────────────────────────
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # www → apex redirect (HTTPS)
    if ($host = www.pinaka.space) {
        return 301 https://pinaka.space$request_uri;
    }
}

# ═══════════════════╗
#  HTTPS — port 443  ║  BACKEND API  →  api.pinaka.space
# ═══════════════════╝

server {
    listen 443 ssl;
    http2  on;
    server_name api.pinaka.space;

    # ── SSL certificates ──────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.pinaka.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pinaka.space/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.pinaka.space/chain.pem;

    # ── SSL hardening (same as above) ────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — disabled (certbot standalone certs have no OCSP URL)
    # ssl_stapling        on;
    # ssl_stapling_verify on;
    # resolver            8.8.8.8 8.8.4.4 valid=300s;
    # resolver_timeout    5s;

    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # ── Proxy to backend container ────────────────────────────────────────────
    location / {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Required for Express sessions / cookies over proxy
        proxy_set_header   X-Forwarded-Host  $server_name;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
