
services:
  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pinaka_backend
    restart: always
    # No host port mapping — only accessible internally via Docker network
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CORS_ORIGIN=https://pinaka.space,https://www.pinaka.space
    env_file:
      - ./backend/.env
    networks:
      - pinaka_net

  # ─── Frontend (static files via Nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://api.pinaka.space
    container_name: pinaka_frontend
    restart: always
    # No host port mapping — only accessible internally via Docker network
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - pinaka_net

  # ─── Nginx Reverse Proxy (entry point for all traffic) ────────────────────────
  nginx:
    image: nginx:alpine
    container_name: pinaka_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Main reverse proxy config
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Per-domain server block configs
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Let's Encrypt certificates (populated by Certbot on EC2)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Certbot webroot challenge directory
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - pinaka_net

# ─── Internal Network ─────────────────────────────────────────────────────────
networks:
  pinaka_net:
    driver: bridge
